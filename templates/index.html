<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Efeberk | CyberScanner</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            color: #00ff00; /* Her şey neon yeşil */
            font-family: 'Courier New', Courier, monospace;
            overflow-x: hidden;
        }

        /* Matrix arka planı için canvas ayarları */
        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1; /* En arkada durması için */
            width: 100vw;
            height: 100vh;
        }

        /* Kartların arkasını hafif şeffaf yapıyoruz ki Matrix görünsün */
        .card {
            background-color: rgba(15, 20, 25, 0.85);
            border: 1px solid #00ff00;
            box-shadow: 0 0 15px #00ff0033; /* Hafif yeşil parlama efekti */
            color: #00ff00;
        }

        /* Input (Metin kutusu) ayarları */
        .form-control {
            background-color: rgba(0, 0, 0, 0.7) !important;
            color: #00ff00 !important;
            border: 1px solid #00ff00 !important;
        }

        .form-control::placeholder {
            color: #007700 !important; /* Placeholder biraz daha koyu yeşil */
        }

        /* Buton ayarları */
        .btn-custom {
            background-color: #00ff00;
            color: #000;
            font-weight: bold;
            box-shadow: 0 0 10px #00ff00;
            transition: all 0.3s ease;
        }
        .btn-custom:hover {
            background-color: #000;
            color: #00ff00;
            border: 1px solid #00ff00;
            box-shadow: 0 0 20px #00ff00;
        }

        /* Listelerdeki noktaları kaldırıp hacker tarzı yapıyoruz */
        ul {
            list-style-type: none;
            padding-left: 0;
        }
        ul li::before {
            content: "> ";
            color: #00ff00;
        }
    </style>
</head>
<body>

<canvas id="matrix"></canvas>

<div class="container mt-5">
    <h1 class="text-center mb-4 text-shadow">> Efeberk_Net_Scanner_v1.0</h1>

    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card p-4">
                <form method="POST" action="/">
                    <div class="mb-3">
                        <label class="form-label">> Hedef IP veya Domain girin:</label>
                        <input type="text" class="form-control" name="target" placeholder="Örn: scanme.nmap.org" required>
                    </div>
                    <button type="submit" class="btn btn-custom w-100">> Taramayı Başlat</button>
                </form>
            </div>

            {% if message %}
            <div class="card mt-4 p-4">
                <h5>> Sistem Mesajı: {{ message }}</h5>
                {% if target_ip %}
                <p class="mt-3">> Hedef IP: <strong>{{ target_ip }}</strong></p>
                <hr style="border-color: #00ff00; opacity: 1;">
                <p>> Bulunan Açık Portlar:</p>
                <ul>
                    {% for port in open_ports %}
                    <li>Port: <strong>{{ port }}</strong> AÇIK</li>
                    {% endfor %}
                </ul>
                {% endif %}
            </div>
            {% endif %}

        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('matrix');
    const ctx = canvas.getContext('2d');

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    // Ekranda akacak karakterler (Sayılar, harfler ve semboller)
    const characters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%^&*()_+<>[]{}';
    const fontSize = 16;
    const columns = canvas.width / fontSize;

    // Damlaların Y pozisyonlarını tutan dizi
    const drops = [];
    for (let x = 0; x < columns; x++) {
        drops[x] = 1;
    }

    function draw() {
        // Siyah arka planı çok hafif saydam çiziyoruz (iz bırakma efekti için)
        ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Yazı rengi neon yeşil
        ctx.fillStyle = '#0f0';
        ctx.font = fontSize + 'px monospace';

        for (let i = 0; i < drops.length; i++) {
            // Rastgele bir karakter seç
            const text = characters.charAt(Math.floor(Math.random() * characters.length));

            // Karakteri ekrana çiz
            ctx.fillText(text, i * fontSize, drops[i] * fontSize);

            // Damla ekranın altına indiyse rastgele bir ihtimalle başa döndür
            if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                drops[i] = 0;
            }

            // Damlayı aşağı kaydır
            drops[i]++;
        }
    }

    // Animasyon hızı (milisaniye cinsinden)
    setInterval(draw, 33);

    // Ekran boyutu değişirse canvas'ı güncelle
    window.addEventListener('resize', () => {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    });
</script>
</body>
</html>
